# HTTPS setup after a certificate exists at /etc/letsencrypt/live/thaitucmd.store/.
# www.thaitucmd.store is intentionally omitted until its DNS A record exists.

upstream vitastore_app {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name thaitucmd.store;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name thaitucmd.store;

    ssl_certificate /etc/letsencrypt/live/thaitucmd.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thaitucmd.store/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    location = /VitaStore {
        return 301 /VitaStore/;
    }

    location /VitaStore/ {
        proxy_pass http://vitastore_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        return 301 /VitaStore/;
    }
}
