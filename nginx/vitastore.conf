# Setup after GitHub Actions copies this file to /opt/vitastore/nginx/vitastore.conf:
# sudo install -m 0644 /opt/vitastore/nginx/vitastore.conf /etc/nginx/sites-available/vitastore.conf
# sudo ln -sfn /etc/nginx/sites-available/vitastore.conf /etc/nginx/sites-enabled/vitastore.conf
# sudo nginx -t && sudo systemctl reload nginx

upstream vitastore_app {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name thaitucmd.store www.thaitucmd.store;

    client_max_body_size 20m;

    location = /VitaStore {
        return 301 /VitaStore/;
    }

    location /VitaStore/ {
        proxy_pass http://vitastore_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        return 301 /VitaStore/;
    }
}
