server:
  port: 8080
  servlet:
    context-path: /VitaStore

spring:
  datasource:
    url: "jdbc:mysql://localhost:3306/EcommerceDB"
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false
