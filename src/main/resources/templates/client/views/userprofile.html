<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thông tin tài khoản – VitaStore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/client/css/variables.css}" />
    <link rel="stylesheet" th:href="@{/client/css/main.css}" />
    <link rel="stylesheet" th:href="@{/client/css/components.css}" />
    <link rel="stylesheet" th:href="@{/client/css/pages.css}" />
    <link rel="stylesheet" th:href="@{/client/css/shared.css}" />
    <link rel="stylesheet" th:href="@{/client/css/userprofile.css}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  </head>
  <body>
    <div th:replace="~{client/fragments/header :: header}"></div>

    <div class="page-wrapper">
      <aside class="sidebar">
        <div class="sidebar-user-card">
          <div class="sidebar-avatar" th:text="${user.fullName.substring(0,1).toUpperCase()}">U</div>
          <div class="sidebar-username" th:text="${user.fullName}">Người dùng</div>
          <div class="sidebar-email" th:text="${user.email}">email@example.com</div>
        </div>
        <nav class="sidebar-nav">
          <div class="sidebar-nav-group">
            <div class="sidebar-nav-label">Tài khoản</div>
            <a th:href="@{/userprofile}" class="sidebar-nav-item active"><i class="ti ti-user"></i> Thông tin chung</a>
          </div>
          <div class="sidebar-nav-group">
            <div class="sidebar-nav-label">Quản lí</div>
            <a th:href="@{/orders}" class="sidebar-nav-item"><i class="ti ti-shopping-bag"></i> Đơn hàng</a>
            <a th:href="@{/address}" class="sidebar-nav-item"><i class="ti ti-map-pin"></i> Địa chỉ nhận hàng</a>
          </div>
        </nav>
      </aside>

      <main class="main-content">
        <div class="profile-card">
          <div class="profile-body">
            <div th:if="${profileSuccess != null}" class="notify notify-success">
              <i class="ti ti-check-circle"></i> <span th:text="${profileSuccess}">Thành công</span>
              <div class="notify-bar"></div>
            </div>
            <div th:if="${profileError != null}" class="notify notify-error">
              <i class="ti ti-alert-circle"></i> <span th:text="${profileError}">Lỗi</span>
              <div class="notify-bar"></div>
            </div>
            <form th:action="@{/userprofile/update}" method="post">
              <div class="field-group">
                <label class="field-label">Họ và tên</label>
                <input class="field-input" type="text" name="fullName" th:value="${user.fullName}" required />
              </div>
              <div class="field-group">
                <label class="field-label">Email</label>
                <input class="field-input" type="email" name="email" th:value="${user.email}" required />
              </div>
              <div class="field-group">
                <label class="field-label">Số điện thoại</label>
                <input class="field-input" type="tel" name="phone" th:value="${user.phone}" placeholder="Chưa cập nhật" />
              </div>
              <div class="field-group">
                <label class="field-label">Vai trò</label>
                <div class="role-display">
                  <span class="badge badge-blue" th:if="${user.role.name() == 'ADMIN'}"><i class="ti ti-shield"></i> Quản trị viên</span>
                  <span class="badge badge-green" th:if="${user.role.name() == 'USER'}"><i class="ti ti-user"></i> Khách hàng</span>
                </div>
              </div>
              <div class="field-group">
                <label class="field-label">Mật khẩu</label>
                <div class="password-row">
                  <input class="field-input" type="password" value="········" disabled />
                  <button type="button" class="btn btn-outline btn-sm" onclick="openModal('changePasswordModal')"><i class="ti ti-edit"></i> Đổi mật khẩu</button>
                </div>
              </div>

              <div class="form-actions">
                <button type="submit" class="btn btn-primary"><i class="ti ti-device-floppy"></i> Lưu thay đổi</button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>

    <!-- MODAL: Đổi mật khẩu -->
    <div class="modal-backdrop" id="changePasswordModal">
      <div class="modal-box" style="max-width:460px">
        <div class="modal-header">
          <span class="modal-title"><i class="ti ti-key"></i> Đổi mật khẩu</span>
          <button class="modal-close" onclick="closeModal('changePasswordModal')"><i class="ti ti-x"></i></button>
        </div>
        <form th:action="@{/userprofile/change-password}" method="post">
          <div class="modal-body">
            <div th:if="${passwordSuccess != null}" class="notify notify-success" style="margin-bottom:var(--space-4)">
              <i class="ti ti-check-circle"></i> <span th:text="${passwordSuccess}">Thành công</span>
              <div class="notify-bar"></div>
            </div>
            <div th:if="${passwordError != null}" class="notify notify-error" style="margin-bottom:var(--space-4)">
              <i class="ti ti-alert-circle"></i> <span th:text="${passwordError}">Lỗi</span>
              <div class="notify-bar"></div>
            </div>
            <div class="form-group">
              <label class="form-label">Mật khẩu hiện tại</label>
              <input class="form-control" type="password" name="currentPassword" required placeholder="Nhập mật khẩu hiện tại" />
            </div>
            <div class="form-group">
              <label class="form-label">Mật khẩu mới</label>
              <input class="form-control" type="password" name="newPassword" required placeholder="Ít nhất 8 ký tự" />
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Xác nhận mật khẩu mới</label>
              <input class="form-control" type="password" name="confirmPassword" required placeholder="Nhập lại mật khẩu mới" />
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline" onclick="closeModal('changePasswordModal')">Hủy</button>
            <button type="submit" class="btn btn-primary">Xác nhận</button>
          </div>
        </form>
      </div>
    </div>

    <div th:replace="~{client/fragments/footer :: footer}"></div>
    <div th:replace="~{client/fragments/contact :: contact}"></div>

    <script th:src="@{/client/js/app.js}"></script>
    <script>
      function openModal(id) { document.getElementById(id).classList.add('open'); }
      function closeModal(id) { document.getElementById(id).classList.remove('open'); }
      document.querySelectorAll('.modal-backdrop').forEach(function(m) {
        m.addEventListener('click', function(e) { if (e.target === m) m.classList.remove('open'); });
      });

      document.querySelectorAll('.notify').forEach(function(n) {
        var bar = n.querySelector('.notify-bar');
        if (bar) {
          bar.style.transition = 'width 3s linear';
          requestAnimationFrame(function() { bar.style.width = '0%'; });
        }
        setTimeout(function() {
          n.style.transition = 'opacity 0.4s ease';
          n.style.opacity = '0';
          setTimeout(function() { n.remove(); }, 400);
        }, 3000);
      });
    </script>
  </body>
</html>
