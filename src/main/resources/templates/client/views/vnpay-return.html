<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kết quả thanh toán VNPAY – VitaStore Thực phẩm chức năng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/client/css/variables.css}" />
    <link rel="stylesheet" th:href="@{/client/css/main.css}" />
    <link rel="stylesheet" th:href="@{/client/css/components.css}" />
    <link rel="stylesheet" th:href="@{/client/css/pages.css}" />
  </head>
  <body>
    <div th:replace="~{client/fragments/header :: header}"></div>

    <main>
      <div class="container" style="padding-top: 28px; padding-bottom: 64px">
        <nav class="breadcrumb">
          <a th:href="@{/}">Trang chủ</a>
          <span class="breadcrumb-sep">›</span>
          <a th:href="@{/cart}">Giỏ hàng</a>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-current">Kết quả thanh toán</span>
        </nav>

        <div style="max-width:560px;margin:40px auto">
          <div th:if="${success}" style="text-align:center;padding:40px 24px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px">
            <div style="width:64px;height:64px;border-radius:50%;background:#22c55e;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <h2 style="font-size:22px;font-weight:700;color:#166534;margin:0 0 8px">Thanh toán thành công!</h2>
            <p style="color:#15803d;margin:0 0 20px;font-size:15px" th:text="${message}">Thông báo</p>
            <div style="background:#fff;border-radius:8px;padding:16px;text-align:left;font-size:14px;line-height:1.8">
              <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #e5e7eb">
                <span style="color:#6b7280">Mã đơn hàng</span>
                <strong th:text="'#' + ${orderId}">#123</strong>
              </div>
              <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #e5e7eb">
                <span style="color:#6b7280">Mã giao dịch VNPAY</span>
                <strong th:text="${transactionNo}">123456</strong>
              </div>
              <div style="display:flex;justify-content:space-between;padding:6px 0">
                <span style="color:#6b7280">Số tiền</span>
                <strong style="color:#16a34a;font-size:16px" th:text="${#numbers.formatInteger(amount, 1, 'COMMA') + 'đ'}">100.000đ</strong>
              </div>
            </div>
            <a th:href="@{/orders}" class="btn btn-primary" style="margin-top:24px;display:inline-flex;align-items:center;gap:8px">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
              Theo dõi đơn hàng
            </a>
          </div>

          <div th:if="${!success}" style="text-align:center;padding:40px 24px;background:#fef2f2;border:1px solid #fecaca;border-radius:12px">
            <div style="width:64px;height:64px;border-radius:50%;background:#ef4444;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </div>
            <h2 style="font-size:22px;font-weight:700;color:#991b1b;margin:0 0 8px">Thanh toán thất bại</h2>
            <p style="color:#dc2626;margin:0 0 20px;font-size:15px" th:text="${message}">Lỗi</p>
            <div style="background:#fff;border-radius:8px;padding:16px;text-align:left;font-size:14px;line-height:1.8">
              <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #e5e7eb">
                <span style="color:#6b7280">Mã đơn hàng</span>
                <strong th:text="'#' + ${orderId}">#123</strong>
              </div>
              <div style="display:flex;justify-content:space-between;padding:6px 0">
                <span style="color:#6b7280">Mã giao dịch VNPAY</span>
                <strong th:text="${transactionNo}">123456</strong>
              </div>
            </div>
            <a th:href="@{/cart}" class="btn btn-primary" style="margin-top:24px;display:inline-flex;align-items:center;gap:8px">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
              Thử lại
            </a>
          </div>
        </div>
      </div>
    </main>

    <div th:replace="~{client/fragments/footer :: footer}"></div>
    <div th:replace="~{client/fragments/contact :: contact}"></div>

    <script th:src="@{/client/js/app.js}"></script>
  </body>
</html>
