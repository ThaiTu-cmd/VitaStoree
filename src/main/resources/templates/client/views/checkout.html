<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thanh toán – VitaStore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/variables.css}" />
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="stylesheet" th:href="@{/css/components.css}" />
    <link rel="stylesheet" th:href="@{/css/pages.css}" />
  </head>
  <body th:data-logged-in="${session.user != null}">
    <div th:replace="~{fragments/header :: header}"></div>

    <main>
      <div class="container" style="padding-top: 28px; padding-bottom: 64px">
        <!-- Breadcrumb -->
        <nav class="breadcrumb">
          <a th:href="@{/}">Trang chủ</a>
          <span class="breadcrumb-sep">›</span>
          <a th:href="@{/cart}">Giỏ hàng</a>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-current">Thanh toán</span>
        </nav>

        <!-- Steps indicator -->
        <div
          style="
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 32px;
          "
        >
          <div style="display: flex; align-items: center; gap: 8px">
            <div
              style="
                width: 28px;
                height: 28px;
                border-radius: 50%;
                background: var(--color-grey-300);
                color: white;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.75rem;
                font-weight: 700;
              "
            >
              1
            </div>
            <span style="font-size: 0.8rem; color: var(--color-grey-500)"
              >Giỏ hàng</span
            >
          </div>
          <div
            style="width: 48px; height: 2px; background: var(--color-grey-300)"
          ></div>
          <div style="display: flex; align-items: center; gap: 8px">
            <div
              style="
                width: 28px;
                height: 28px;
                border-radius: 50%;
                background: var(--color-green);
                color: white;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.75rem;
                font-weight: 700;
              "
            >
              2
            </div>
            <span
              style="
                font-size: 0.8rem;
                color: var(--color-green);
                font-weight: 600;
              "
              >Thanh toán</span
            >
          </div>
          <div
            style="width: 48px; height: 2px; background: var(--color-grey-300)"
          ></div>
          <div style="display: flex; align-items: center; gap: 8px">
            <div
              style="
                width: 28px;
                height: 28px;
                border-radius: 50%;
                background: var(--color-grey-300);
                color: white;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.75rem;
                font-weight: 700;
              "
            >
              3
            </div>
            <span style="font-size: 0.8rem; color: var(--color-grey-500)"
              >Xác nhận</span
            >
          </div>
        </div>

        <div class="checkout-layout">
          <!-- Left: Forms -->
          <div>
            <!-- Shipping Info -->
            <div class="checkout-section">
              <div class="checkout-section-title">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                  <circle cx="12" cy="10" r="3" />
                </svg>
                Thông tin giao hàng
              </div>
              <form
                th:action="@{/checkout/place-order}"
                method="post"
                id="checkoutForm"
              >
                <input
                  type="hidden"
                  th:name="${_csrf.parameterName}"
                  th:value="${_csrf.token}"
                />

                <div class="form-grid-2">
                  <div class="form-group">
                    <label class="form-label">Họ</label>
                    <input
                      class="form-control"
                      type="text"
                      name="firstName"
                      th:value="${session.user?.firstName}"
                      placeholder="Nguyễn"
                      required
                    />
                  </div>
                  <div class="form-group">
                    <label class="form-label">Tên</label>
                    <input
                      class="form-control"
                      type="text"
                      name="lastName"
                      th:value="${session.user?.lastName}"
                      placeholder="Văn A"
                      required
                    />
                  </div>
                </div>

                <div class="form-grid-2">
                  <div class="form-group">
                    <label class="form-label">Số điện thoại</label>
                    <input
                      class="form-control"
                      type="tel"
                      name="phone"
                      th:value="${session.user?.phone}"
                      placeholder="0966 042 071"
                      required
                    />
                  </div>
                  <div class="form-group">
                    <label class="form-label">Email</label>
                    <input
                      class="form-control"
                      type="email"
                      name="email"
                      th:value="${session.user?.email}"
                      placeholder="email@example.com"
                      required
                    />
                  </div>
                </div>

                <div class="form-group">
                  <label class="form-label">Địa chỉ</label>
                  <input
                    class="form-control"
                    type="text"
                    name="address"
                    placeholder="Số nhà, tên đường..."
                    required
                  />
                </div>

                <div class="form-grid-2">
                  <div class="form-group">
                    <label class="form-label">Tỉnh / Thành phố</label>
                    <select
                      class="form-control form-select"
                      name="province"
                      required
                    >
                      <option value="">Chọn tỉnh/thành...</option>
                      <option>TP. Hồ Chí Minh</option>
                      <option>Hà Nội</option>
                      <option>Đà Nẵng</option>
                      <option>Cần Thơ</option>
                      <option>Khác</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label class="form-label">Quận / Huyện</label>
                    <input
                      class="form-control"
                      type="text"
                      name="district"
                      placeholder="Quận 7..."
                      required
                    />
                  </div>
                </div>

                <div class="form-group">
                  <label class="form-label">Ghi chú đơn hàng (tùy chọn)</label>
                  <textarea
                    class="form-control"
                    name="note"
                    rows="3"
                    placeholder="Ghi chú về đơn hàng, thời gian giao hàng..."
                  ></textarea>
                </div>
              </form>
            </div>

            <!-- Payment Method -->
            <div class="checkout-section">
              <div class="checkout-section-title">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect x="1" y="4" width="22" height="16" rx="2" ry="2" />
                  <line x1="1" y1="10" x2="23" y2="10" />
                </svg>
                Phương thức thanh toán
              </div>

              <label class="payment-option selected">
                <input type="radio" name="paymentMethod" value="cod" checked />
                <div style="font-size: 1.5rem">💵</div>
                <div class="payment-option-label">
                  <div style="font-weight: 600">
                    Thanh toán khi nhận hàng (COD)
                  </div>
                  <div style="font-size: 0.8rem; color: var(--color-grey-500)">
                    Thanh toán bằng tiền mặt khi nhận hàng
                  </div>
                </div>
              </label>

              <label class="payment-option">
                <input
                  type="radio"
                  name="paymentMethod"
                  value="bank-transfer"
                />
                <div style="font-size: 1.5rem">🏦</div>
                <div class="payment-option-label">
                  <div style="font-weight: 600">Chuyển khoản ngân hàng</div>
                  <div style="font-size: 0.8rem; color: var(--color-grey-500)">
                    Chuyển khoản qua tài khoản ngân hàng
                  </div>
                </div>
              </label>

              <label class="payment-option">
                <input type="radio" name="paymentMethod" value="momo" />
                <div style="font-size: 1.5rem">📱</div>
                <div class="payment-option-label">
                  <div style="font-weight: 600">Ví MoMo</div>
                  <div style="font-size: 0.8rem; color: var(--color-grey-500)">
                    Thanh toán qua ví điện tử MoMo
                  </div>
                </div>
              </label>

              <label class="payment-option">
                <input type="radio" name="paymentMethod" value="zalopay" />
                <div style="font-size: 1.5rem">💙</div>
                <div class="payment-option-label">
                  <div style="font-weight: 600">ZaloPay</div>
                  <div style="font-size: 0.8rem; color: var(--color-grey-500)">
                    Thanh toán qua ZaloPay
                  </div>
                </div>
              </label>
            </div>
          </div>

          <!-- Right: Order Summary -->
          <div>
            <div class="cart-summary">
              <div class="summary-title">Đơn hàng của bạn</div>

              <!-- Order Items (from session/cart) -->
              <div id="checkout-items" style="margin-bottom: 16px">
                <!-- Rendered by JS or Thymeleaf -->
                <div
                  th:each="item : ${cartItems}"
                  style="
                    display: flex;
                    gap: 12px;
                    align-items: center;
                    padding: 10px 0;
                    border-bottom: 1px solid var(--color-border);
                  "
                >
                  <img
                    th:src="${item.imageUrl}"
                    style="
                      width: 52px;
                      height: 52px;
                      border-radius: 8px;
                      object-fit: contain;
                      background: var(--color-grey-100);
                      padding: 4px;
                    "
                    alt=""
                  />
                  <div style="flex: 1; min-width: 0">
                    <div
                      style="
                        font-size: 0.8rem;
                        font-weight: 600;
                        white-space: nowrap;
                        overflow: hidden;
                        text-overflow: ellipsis;
                      "
                      th:text="${item.name}"
                    >
                      Tên SP
                    </div>
                    <div
                      style="font-size: 0.75rem; color: var(--color-grey-500)"
                      th:text="${'x' + item.qty}"
                    >
                      x1
                    </div>
                  </div>
                  <div
                    style="
                      font-size: 0.875rem;
                      font-weight: 600;
                      white-space: nowrap;
                    "
                    th:text="${#numbers.formatInteger(item.price * item.qty,1,'COMMA') + 'đ'}"
                  >
                    0đ
                  </div>
                </div>
              </div>

              <div class="summary-row">
                <span>Tạm tính</span>
                <span
                  th:text="${#numbers.formatInteger(subtotal,1,'COMMA') + 'đ'}"
                  id="co-subtotal"
                  >0đ</span
                >
              </div>
              <div class="summary-row">
                <span>Phí vận chuyển</span>
                <span
                  class="green"
                  th:text="${shippingFee == 0 ? 'Miễn phí' : #numbers.formatInteger(shippingFee,1,'COMMA') + 'đ'}"
                  >Miễn phí</span
                >
              </div>
              <div class="summary-row total">
                <span>Tổng cộng</span>
                <span
                  style="color: var(--color-green)"
                  th:text="${#numbers.formatInteger(total,1,'COMMA') + 'đ'}"
                  >0đ</span
                >
              </div>

              <button
                type="submit"
                form="checkoutForm"
                class="btn btn-primary btn-full btn-lg"
                style="margin-top: 16px"
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <polyline points="20 6 9 17 4 12" />
                </svg>
                Đặt hàng ngay
              </button>

              <p
                style="
                  font-size: 0.75rem;
                  color: var(--color-grey-500);
                  text-align: center;
                  margin-top: 12px;
                  line-height: 1.6;
                "
              >
                Bằng cách đặt hàng, bạn đồng ý với
                <a href="#" style="color: var(--color-green)"
                  >Điều khoản dịch vụ</a
                >
                của VitaStore
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <div th:replace="~{fragments/contact :: contact}"></div>
    <script th:src="@{/js/app.js}"></script>
  </body>
</html>
