<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <link rel="stylesheet" th:href="@{/client/css/variables.css}" />
    <link rel="stylesheet" th:href="@{/client/css/main.css}" />
    <link rel="stylesheet" th:href="@{/client/css/components.css}" />
  </head>
  <body>
    <!-- ===== HEADER FRAGMENT ===== -->
    <header class="site-header" th:fragment="header">
      <div class="container">
        <div class="header-inner">
          <!-- Logo -->
          <a class="logo" th:href="@{/}">
            <div class="logo-icon">🌿</div>
            <span class="logo-text">VitaStore</span>
          </a>

          <!-- Navigation -->
          <nav class="main-nav">
            <a
              th:href="@{/}"
              class="nav-link"
              th:classappend="${currentPage == 'home'} ? 'active'"
              >Trang chủ</a
            >
            <a
              th:href="@{/shop}"
              class="nav-link"
              th:classappend="${currentPage == 'shop'} ? 'active'"
              >Tất cả sản phẩm</a
            >
            <a
              th:href="@{/about}"
              class="nav-link"
              th:classappend="${currentPage == 'about'} ? 'active'"
              >Giới thiệu</a
            >
            <a
              th:href="@{/contact}"
              class="nav-link"
              th:classappend="${currentPage == 'contact'} ? 'active'"
              >Liên hệ</a
            >
          </nav>

          <!-- Actions -->
          <div class="header-actions">
            <!-- Cart -->
            <a th:href="@{/cart}" class="cart-btn btn-icon">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="9" cy="21" r="1" />
                <circle cx="20" cy="21" r="1" />
                <path
                  d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
                />
              </svg>
              <span class="cart-badge" style="display: none">0</span>
            </a>

            <!-- Auth -->
            <div th:if="${#authentication.principal == 'anonymousUser'}" class="d-flex gap-2">
              <a th:href="@{/auth/login}" class="btn btn-ghost btn-sm"
                >Đăng nhập</a
              >
              <a
                th:href="@{/auth/register}"
                class="btn btn-primary btn-sm header-register-btn"
                >Đăng ký</a
              >
            </div>
            <div
              th:if="${#authentication.principal != 'anonymousUser'}"
              class="user-dropdown"
            >
              <div class="user-dropdown-trigger">
                <span class="user-greeting"
                  >Xin chào,
                  <strong th:text="${#authentication.principal.fullName}">User</strong></span
                >
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M6 9l6 6 6-6" />
                </svg>
              </div>
              <div class="user-dropdown-menu">
                <a th:href="@{/userprofile}" class="dropdown-item">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                  </svg>
                  Thông tin chung
                </a>
                <a th:href="@{/orders}" class="dropdown-item">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <path d="M16 10a4 4 0 0 1-8 0" />
                  </svg>
                  Quản lý đơn hàng
                </a>
                <a th:href="@{/address}" class="dropdown-item">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                    <circle cx="12" cy="10" r="3" />
                  </svg>
                  Địa chỉ nhận hàng
                </a>
                <div class="dropdown-divider"></div>
                <a th:href="@{/auth/logout}" class="dropdown-item">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                  </svg>
                  Đăng xuất
                </a>
              </div>
            </div>

            <!-- Mobile menu toggle -->
            <button class="menu-toggle" id="menuToggle" aria-label="Menu">
              <span></span><span></span><span></span>
            </button>
          </div>
        </div>
      </div>

      <!-- Mobile Nav -->
      <div
        class="mobile-nav"
        id="mobileNav"
        style="
          display: none;
          border-top: 1px solid var(--color-border);
          background: var(--color-white);
          padding: 12px 0;
        "
      >
        <div
          class="container"
          style="display: flex; flex-direction: column; gap: 4px"
        >
          <a th:href="@{/}" class="nav-link">Trang chủ</a>
          <a th:href="@{/shop}" class="nav-link">Tất cả sản phẩm</a>
          <a th:href="@{/about}" class="nav-link">Giới thiệu</a>
          <a th:href="@{/contact}" class="nav-link">Liên hệ</a>
          <div th:if="${#authentication.principal != 'anonymousUser'}" style="border-top:1px solid var(--color-border);margin:8px 0;padding-top:8px">
            <a th:href="@{/userprofile}" class="nav-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:6px"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Thông tin chung</a>
            <a th:href="@{/orders}" class="nav-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:6px"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Quản lý đơn hàng</a>
            <a th:href="@{/address}" class="nav-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:6px"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>Địa chỉ nhận hàng</a>
            <a th:href="@{/auth/logout}" class="nav-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:6px"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Đăng xuất</a>
          </div>
        </div>
      </div>
    </header>

    <style>
      .header-actions .logout-btn:hover {
        transform: none !important;
        filter: brightness(1.3);
      }
      @media (min-width: 769px) {
        .header-actions .user-dropdown .btn-logout-mobile {
          display: none;
        }
      }
    </style>
    <script>
      document.getElementById("menuToggle")?.addEventListener("click", () => {
        const nav = document.getElementById("mobileNav");
        if (nav)
          nav.style.display = nav.style.display === "none" ? "block" : "none";
      });
    </script>
  </body>
</html>
