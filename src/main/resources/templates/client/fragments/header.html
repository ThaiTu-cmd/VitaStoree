<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <link rel="stylesheet" th:href="@{/css/variables.css}" />
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="stylesheet" th:href="@{/css/components.css}" />
  </head>
  <body>
    <!-- ===== HEADER FRAGMENT ===== -->
    <header class="site-header" th:fragment="header">
      <div class="container">
        <div class="header-inner">
          <!-- Logo -->
          <a class="logo" th:href="@{/}">
            <div class="logo-icon">
              <svg
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="none"
                stroke="white"
                stroke-width="2.5"
              >
                <path
                  d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
                />
              </svg>
            </div>
            <span class="logo-text">Vita<span>Store</span></span>
          </a>

          <!-- Navigation -->
          <nav class="main-nav">
            <a
              th:href="@{/}"
              class="nav-link"
              th:classappend="${currentPage == 'home'} ? 'active'"
              >Trang chủ</a
            >
            <a
              th:href="@{/shop}"
              class="nav-link"
              th:classappend="${currentPage == 'shop'} ? 'active'"
              >Tất cả sản phẩm</a
            >
            <a
              th:href="@{/about}"
              class="nav-link"
              th:classappend="${currentPage == 'about'} ? 'active'"
              >Giới thiệu</a
            >
            <a
              th:href="@{/contact}"
              class="nav-link"
              th:classappend="${currentPage == 'contact'} ? 'active'"
              >Liên hệ</a
            >
          </nav>

          <!-- Search -->
          <form class="search-box" th:action="@{/shop}" method="get">
            <input
              class="search-input"
              type="text"
              name="q"
              th:value="${param.q}"
              placeholder="Tìm kiếm sản phẩm..."
            />
            <button class="search-btn" type="submit">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
            </button>
          </form>

          <!-- Actions -->
          <div class="header-actions">
            <!-- Cart -->
            <a th:href="@{/cart}" class="cart-btn btn-icon">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="9" cy="21" r="1" />
                <circle cx="20" cy="21" r="1" />
                <path
                  d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
                />
              </svg>
              <span class="cart-badge" style="display: none">0</span>
            </a>

            <!-- Auth -->
            <div th:if="${session.user == null}" class="d-flex gap-2">
              <a th:href="@{/auth/login}" class="btn btn-ghost btn-sm"
                >Đăng nhập</a
              >
              <a th:href="@{/auth/register}" class="btn btn-primary btn-sm"
                >Đăng ký</a
              >
            </div>
            <div
              th:if="${session.user != null}"
              class="d-flex align-center gap-2"
            >
              <span style="font-size: 0.875rem; color: var(--color-grey-700)"
                >Xin chào,
                <strong th:text="${session.user.name}">User</strong></span
              >
              <a th:href="@{/auth/logout}" class="btn btn-outline btn-sm"
                >Đăng xuất</a
              >
            </div>

            <!-- Mobile menu toggle -->
            <button class="menu-toggle" id="menuToggle" aria-label="Menu">
              <span></span><span></span><span></span>
            </button>
          </div>
        </div>
      </div>

      <!-- Mobile Nav -->
      <div
        class="mobile-nav"
        id="mobileNav"
        style="
          display: none;
          border-top: 1px solid var(--color-border);
          background: white;
          padding: 12px 0;
        "
      >
        <div
          class="container"
          style="display: flex; flex-direction: column; gap: 4px"
        >
          <a th:href="@{/}" class="nav-link">Trang chủ</a>
          <a th:href="@{/shop}" class="nav-link">Tất cả sản phẩm</a>
          <a th:href="@{/about}" class="nav-link">Giới thiệu</a>
          <a th:href="@{/contact}" class="nav-link">Liên hệ</a>
        </div>
      </div>
    </header>

    <script>
      document.getElementById("menuToggle")?.addEventListener("click", () => {
        const nav = document.getElementById("mobileNav");
        if (nav)
          nav.style.display = nav.style.display === "none" ? "block" : "none";
      });
    </script>
  </body>
</html>
