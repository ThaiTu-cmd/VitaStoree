<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <body>
    <!-- ===== SIDEBAR FILTER FRAGMENT ===== -->
    <aside class="filter-sidebar" th:fragment="sidebar">
      <form id="filter-form">
        <div class="filter-header">
          <h4>
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
            </svg>
            Bộ lọc
          </h4>
          <span class="filter-clear">Xóa tất cả</span>
        </div>

        <!-- Category Filter -->
        <div class="filter-section">
          <div class="filter-section-title">
            <span>Danh mục</span>
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </div>
          <div class="filter-options">
            <label
              class="filter-option"
              th:each="cat : ${categories}"
            >
              <input
                type="checkbox"
                name="category"
                th:value="${cat.slug}"
                th:checked="${param.category != null and #lists.contains(param.category, cat.slug)}"
              />
              <span th:text="${cat.name}">Danh mục</span>
              <span class="count" th:text="${cat.products}">0</span>
            </label>
          </div>
        </div>

        <!-- Price Filter -->
        <div class="filter-section">
          <div class="filter-section-title">
            <span>Mức giá</span>
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </div>
          <div class="filter-options">
            <label class="filter-option">
              <input
                type="checkbox"
                name="price"
                value="under500k"
                th:checked="${param.price != null and (#lists.contains(param.price, 'under500k') or #lists.contains(param.price, 'under100k'))}"
              />
              <span>Dưới 500.000đ</span>
              <span class="count" th:text="${countUnder500k}">0</span>
            </label>
            <label class="filter-option">
              <input
                type="checkbox"
                name="price"
                value="500k-1500k"
                th:checked="${param.price != null and (#lists.contains(param.price, '500k-1500k') or #lists.contains(param.price, '100k-200k'))}"
              />
              <span>500.000đ – 1.500.000đ</span>
              <span class="count" th:text="${count500kTo1500k}">0</span>
            </label>
            <label class="filter-option">
              <input
                type="checkbox"
                name="price"
                value="1500k-3000k"
                th:checked="${param.price != null and (#lists.contains(param.price, '1500k-3000k') or #lists.contains(param.price, '200k-500k'))}"
              />
              <span>1.500.000đ – 3.000.000đ</span>
              <span class="count" th:text="${count1500kTo3000k}">0</span>
            </label>
            <label class="filter-option">
              <input
                type="checkbox"
                name="price"
                value="over3000k"
                th:checked="${param.price != null and (#lists.contains(param.price, 'over3000k') or #lists.contains(param.price, 'over1m'))}"
              />
              <span>Trên 3.000.000đ</span>
              <span class="count" th:text="${countOver3000k}">0</span>
            </label>
          </div>
        </div>


      </form>
    </aside>
  </body>
</html>
