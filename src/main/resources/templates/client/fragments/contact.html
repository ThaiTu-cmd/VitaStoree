<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <body>
    <!-- ===== CONTACT BUBBLE FRAGMENT ===== -->
    <div class="contact-bubble-wrap" th:fragment="contact">
      <!-- Popup -->
      <div class="contact-popup" id="contactPopup">
        <div class="contact-popup-header">
          <h6>Liên hệ với chúng tôi</h6>
          <button class="contact-popup-close" aria-label="Đóng">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>

        <!-- Hotline -->
        <a href="tel:0966042071" class="contact-item">
          <div class="contact-icon phone">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.8 19.79 19.79 0 0 1 1.61 5.2 2 2 0 0 1 3.59 3h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 10.5a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.72 18z"
              />
            </svg>
          </div>
          <div class="contact-info">
            <span>Hotline hỗ trợ</span>
            <span>0966 042 071</span>
          </div>
        </a>

        <!-- Messenger -->
        <a
          href="https://m.me/winestore"
          target="_blank"
          rel="noopener noreferrer"
          class="contact-item"
        >
          <div class="contact-icon messenger">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2">
              <path
                d="M12 2C6.48 2 2 6.16 2 11.25c0 2.83 1.37 5.35 3.52 7.06V22l3.4-1.87c.91.25 1.88.37 2.88.37 5.52 0 10-4.16 10-9.25C22 6.16 17.52 2 12 2zm1.09 12.47l-2.55-2.72-4.98 2.72 5.48-5.82 2.61 2.72 4.93-2.72-5.49 5.82z"
              />
            </svg>
          </div>
          <div class="contact-info">
            <span>Facebook Messenger</span>
            <span>Chat ngay</span>
          </div>
        </a>

        <!-- Zalo -->
        <a
          href="https://zalo.me/0966042071"
          target="_blank"
          rel="noopener noreferrer"
          class="contact-item"
        >
          <div class="contact-icon zalo">
            <svg width="18" height="18" viewBox="0 0 48 48" fill="#0068ff">
              <rect width="48" height="48" rx="10" fill="#0068ff" />
              <text
                x="7"
                y="34"
                font-size="22"
                font-weight="bold"
                fill="white"
                font-family="Arial"
              >
                Z
              </text>
            </svg>
          </div>
          <div class="contact-info">
            <span>Zalo</span>
            <span>0966 042 071</span>
          </div>
        </a>
      </div>

      <!-- Toggle Button -->
      <button class="contact-toggle" id="contactToggle" aria-label="Liên hệ">
        <span class="ping"></span>
        <svg
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="white"
          stroke-width="2"
        >
          <path
            d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
          />
        </svg>
      </button>
    </div>
  </body>
</html>
