<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập – VitaStore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/variables.css}" />
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="stylesheet" th:href="@{/css/components.css}" />
    <link rel="stylesheet" th:href="@{/css/pages.css}" />
  </head>
  <body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="auth-page">
      <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo">
          <a th:href="@{/}" class="logo" style="justify-content: center">
            <div class="logo-icon">
              <svg
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="none"
                stroke="white"
                stroke-width="2.5"
              >
                <path
                  d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
                />
              </svg>
            </div>
            <span class="logo-text">Vita<span>Store</span></span>
          </a>
        </div>

        <div class="text-center">
          <h3 class="auth-title">Chào mừng trở lại!</h3>
          <p class="auth-subtitle">Đăng nhập để tiếp tục mua sắm</p>
        </div>

        <!-- Error message -->
        <div
          th:if="${error}"
          style="
            background: #ffebee;
            color: #c62828;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
          "
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <span th:text="${error}">Sai tên đăng nhập hoặc mật khẩu.</span>
        </div>

        <!-- Success message -->
        <div
          th:if="${success}"
          style="
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
          "
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="20 6 9 17 4 12" />
          </svg>
          <span th:text="${success}">Thành công.</span>
        </div>

        <!-- Login Form -->
        <form th:action="@{/auth/login}" method="post">
          <input
            type="hidden"
            th:name="${_csrf.parameterName}"
            th:value="${_csrf.token}"
          />

          <div class="form-group">
            <label class="form-label">Email</label>
            <div class="input-icon-wrap">
              <svg
                class="input-icon"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                />
                <polyline points="22,6 12,13 2,6" />
              </svg>
              <input
                class="form-control"
                type="email"
                name="email"
                th:value="${param.email}"
                placeholder="email@example.com"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label
              class="form-label"
              style="display: flex; justify-content: space-between"
            >
              Mật khẩu
              <a
                th:href="@{/auth/forgot-password}"
                style="font-size: 0.8rem; color: var(--color-green)"
                >Quên mật khẩu?</a
              >
            </label>
            <div class="input-icon-wrap">
              <svg
                class="input-icon"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <input
                class="form-control"
                type="password"
                name="password"
                id="loginPwd"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              />
              <span
                class="input-eye"
                onclick="togglePwd('loginPwd', this)"
                title="Hiện/ẩn mật khẩu"
              >
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </span>
            </div>
          </div>

          <div
            style="
              display: flex;
              align-items: center;
              gap: 8px;
              margin-bottom: 20px;
            "
          >
            <input
              type="checkbox"
              id="rememberMe"
              name="rememberMe"
              style="
                accent-color: var(--color-green);
                width: 15px;
                height: 15px;
              "
            />
            <label
              for="rememberMe"
              style="
                font-size: 0.875rem;
                color: var(--color-grey-700);
                cursor: pointer;
              "
              >Ghi nhớ đăng nhập</label
            >
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg">
            Đăng nhập
          </button>
        </form>

        <div class="divider-or">hoặc</div>

        <!-- Social Login Placeholder -->
        <div style="display: flex; gap: 12px">
          <button
            class="btn btn-ghost btn-full"
            style="border: 1.5px solid var(--color-border); gap: 8px"
            disabled
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4"
              />
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853"
              />
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                fill="#FBBC05"
              />
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                fill="#EA4335"
              />
            </svg>
            Google
          </button>
          <button
            class="btn btn-ghost btn-full"
            style="border: 1.5px solid var(--color-border); gap: 8px"
            disabled
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2">
              <path
                d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"
              />
            </svg>
            Facebook
          </button>
        </div>

        <p class="auth-footer">
          Chưa có tài khoản?
          <a th:href="@{/auth/register}">Đăng ký ngay</a>
        </p>
      </div>
    </div>

    <script>
      function togglePwd(id, icon) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
      }
    </script>
    <script th:src="@{/js/app.js}"></script>
  </body>
</html>
