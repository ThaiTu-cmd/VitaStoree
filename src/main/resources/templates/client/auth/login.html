<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập – VitaStore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/client/css/variables.css}" />
    <link rel="stylesheet" th:href="@{/client/css/main.css}" />
    <link rel="stylesheet" th:href="@{/client/css/components.css}" />
    <link rel="stylesheet" th:href="@{/client/css/pages.css}" />
    <style>
      body {
        position: relative;
        overflow: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(76, 175, 80, 0.12) 0%, transparent 70%);
        top: -200px;
        right: -150px;
        border-radius: 50%;
        pointer-events: none;
      }
      body::after {
        content: "";
        position: fixed;
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(33, 150, 243, 0.1) 0%, transparent 70%);
        bottom: -120px;
        left: -100px;
        border-radius: 50%;
        pointer-events: none;
      }
      .auth-card {
        position: relative;
        z-index: 1;
        animation: authFadeIn 0.5s ease both;
      }
      @keyframes authFadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .logo-icon {
        background: linear-gradient(135deg, var(--color-green), #66bb6a);
        border: none;
        box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
      }
      .logo-icon svg { color: #fff; }
      .logo-text {
        color: var(--color-grey-900);
        font-weight: 700;
      }
      .auth-title { color: var(--color-grey-900); }
      .auth-subtitle { color: var(--color-grey-500); }
      .form-label { color: var(--color-grey-700); font-weight: 600; }
      .form-control {
        background: var(--color-grey-100);
        border-color: var(--color-grey-300);
        color: var(--color-grey-900);
      }
      .form-control:focus {
        border-color: var(--color-green);
        box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.15);
        background: var(--color-white);
      }
      .form-control::placeholder { color: var(--color-grey-400); }
      .input-icon-wrap .input-icon { color: var(--color-grey-400); }
      .input-icon-wrap .input-eye,
      .input-icon-wrap .input-eye svg { color: var(--color-grey-400); }
      .input-icon-wrap .input-eye:hover { color: var(--color-green); }
      .divider-or { color: var(--color-grey-400); }
      .divider-or::before,
      .divider-or::after { background: var(--color-border); }
      .auth-footer { color: var(--color-grey-500); }
      .auth-footer a { color: var(--color-green); }
      .btn-ghost {
        color: var(--color-grey-700);
        border-color: var(--color-grey-300);
      }
      .btn-ghost:hover { background: var(--color-grey-100); }
      .auth-alert {
        background: #fef2f2;
        color: var(--color-danger);
        padding: 10px 14px;
        border-radius: var(--radius-md);
        font-size: var(--font-size-sm);
        margin-bottom: var(--space-5);
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid #fecaca;
      }
      .auth-alert-success {
        background: #f0fdf4;
        color: var(--color-success);
        border-color: #bbf7d0;
      }
    </style>
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo">
          <a th:href="@{/}" class="logo" style="justify-content: center">
            <div class="logo-icon">🌿</div>
            <span class="logo-text">VitaStore</span>
          </a>
        </div>

        <div class="text-center">
          <h3 class="auth-title">Chào mừng trở lại!</h3>
          <p class="auth-subtitle">Đăng nhập để tiếp tục mua sắm</p>
        </div>

        <!-- Error message -->
        <div
          th:if="${param.error}"
          class="auth-alert"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <span th:text="${error}">Sai tên đăng nhập hoặc mật khẩu.</span>
        </div>

        <!-- Success message -->
        <div
          th:if="${param.success}"
          class="auth-alert auth-alert-success"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="20 6 9 17 4 12" />
          </svg>
          <span th:text="${success}">Thành công.</span>
        </div>

        <!-- Login Form -->
        <form th:action="@{/auth/login}" method="post">

          <div class="form-group">
            <label class="form-label">Email</label>
            <div class="input-icon-wrap">
              <svg
                class="input-icon"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                />
                <polyline points="22,6 12,13 2,6" />
              </svg>
              <input
                class="form-control"
                type="email"
                name="email"
                th:value="${param.email}"
                placeholder="email@example.com"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">
              Mật khẩu
            </label>
            <div class="input-icon-wrap">
              <svg
                class="input-icon"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <input
                class="form-control"
                type="password"
                name="password"
                id="loginPwd"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              />
              <span
                class="input-eye"
                onclick="togglePwd('loginPwd', this)"
                title="Hiện/ẩn mật khẩu"
              >
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </span>
            </div>
            <a
              th:href="@{/auth/forgot-password}"
              style="font-size: var(--font-size-xs); color: var(--color-green); display: inline-block; margin-top: 6px"
            >Quên mật khẩu?</a>
          </div>

          <div
            style="
              display: flex;
              align-items: center;
              gap: 8px;
              margin-bottom: 20px;
            "
          >
            <input
              type="checkbox"
              id="rememberMe"
              name="rememberMe"
              style="
                accent-color: var(--color-green);
                width: 15px;
                height: 15px;
              "
            />
            <label
              for="rememberMe"
              style="
                font-size: 0.875rem;
                color: #4a3a2a;
                cursor: pointer;
              "
              >Ghi nhớ đăng nhập</label
            >
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg">
            Đăng nhập
          </button>
        </form>

        <p class="auth-footer">
          Chưa có tài khoản?
          <a th:href="@{/auth/register}">Đăng ký ngay</a>
        </p>
      </div>
    </div>

    <script>
      function togglePwd(id, icon) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
      }
    </script>
    <script th:src="@{/client/js/app.js}"></script>
  </body>
</html>
