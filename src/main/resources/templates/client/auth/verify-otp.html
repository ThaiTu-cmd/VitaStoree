<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xác thực OTP – VitaStore Thực phẩm chức năng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/client/css/variables.css}" />
    <link rel="stylesheet" th:href="@{/client/css/main.css}" />
    <link rel="stylesheet" th:href="@{/client/css/components.css}" />
    <link rel="stylesheet" th:href="@{/client/css/pages.css}" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-logo">
          <a th:href="@{/}" class="logo" style="justify-content: center">
            <div class="logo-icon">🌿</div>
            <span class="logo-text">VitaStore</span>
          </a>
        </div>

        <div class="text-center">
          <h3 class="auth-title">Xác thực OTP</h3>
          <p class="auth-subtitle">Nhập mã OTP gồm 6 chữ số được gửi đến email của bạn</p>
        </div>

        <div th:if="${error}" style="background:#ffebee;color:#c62828;padding:10px 14px;border-radius:8px;font-size:0.875rem;margin-bottom:20px;display:flex;align-items:center;gap:8px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <span th:text="${error}">Mã OTP không đúng.</span>
        </div>

        <form th:action="@{/auth/verify-otp}" method="post">
          <input type="hidden" name="email" th:value="${email}" />

          <div class="form-group">
            <label class="form-label">Mã OTP</label>
            <div class="input-icon-wrap">
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <input class="form-control" type="text" name="otp" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="123456" style="font-size:1.5rem;letter-spacing:8px;text-align:center" required />
            </div>
            <p style="font-size:0.75rem;color:var(--color-grey-500);margin-top:4px">Mã OTP có hiệu lực trong 5 phút</p>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg">Xác thực</button>
        </form>

        <p class="auth-footer">
          <a th:href="@{/auth/forgot-password}">Gửi lại mã OTP</a>
        </p>
      </div>
    </div>
    <script th:src="@{/client/js/app.js}"></script>
  </body>
</html>
