<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đặt lại mật khẩu – VitaStore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/client/css/variables.css}" />
    <link rel="stylesheet" th:href="@{/client/css/main.css}" />
    <link rel="stylesheet" th:href="@{/client/css/components.css}" />
    <link rel="stylesheet" th:href="@{/client/css/pages.css}" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-logo">
          <a th:href="@{/}" class="logo" style="justify-content: center">
            <div class="logo-icon">🌿</div>
            <span class="logo-text">VitaStore</span>
          </a>
        </div>

        <div class="text-center">
          <h3 class="auth-title">Đặt lại mật khẩu</h3>
          <p class="auth-subtitle">Nhập mật khẩu mới cho tài khoản của bạn</p>
        </div>

        <div th:if="${error}" style="background:#ffebee;color:#c62828;padding:10px 14px;border-radius:8px;font-size:0.875rem;margin-bottom:20px;display:flex;align-items:center;gap:8px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <span th:text="${error}">Có lỗi xảy ra.</span>
        </div>

        <form th:action="@{/auth/reset-password}" method="post" id="resetForm">
          <input type="hidden" name="email" th:value="${email}" />
          <input type="hidden" name="token" th:value="${token}" />

          <div class="form-group">
            <label class="form-label">Mật khẩu mới</label>
            <div class="input-icon-wrap">
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <input class="form-control" type="password" name="password" id="resetPwd" placeholder="Tối thiểu 8 ký tự" autocomplete="new-password" required minlength="8" />
              <span class="input-eye" onclick="togglePwd('resetPwd', this)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Xác nhận mật khẩu mới</label>
            <div class="input-icon-wrap">
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <input class="form-control" type="password" name="confirmPassword" id="resetPwd2" placeholder="Nhập lại mật khẩu" autocomplete="new-password" required />
              <span class="input-eye" onclick="togglePwd('resetPwd2', this)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </span>
            </div>
            <p id="pwdMatchMsg" style="font-size:0.75rem;margin-top:4px"></p>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg">Đặt lại mật khẩu</button>
        </form>

        <p class="auth-footer">
          <a th:href="@{/auth/login}">Quay lại đăng nhập</a>
        </p>
      </div>
    </div>

    <script>
      function togglePwd(id, icon) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
      }

      document.getElementById("resetPwd2")?.addEventListener("input", function() {
        const pwd = document.getElementById("resetPwd").value;
        const msg = document.getElementById("pwdMatchMsg");
        if (this.value === "") { msg.textContent = ""; return; }
        if (this.value === pwd) {
          msg.textContent = "✓ Mật khẩu khớp";
          msg.style.color = "var(--color-green)";
        } else {
          msg.textContent = "✕ Mật khẩu không khớp";
          msg.style.color = "#c62828";
        }
      });

      document.getElementById("resetForm")?.addEventListener("submit", function(e) {
        const pwd = document.getElementById("resetPwd").value;
        const pwd2 = document.getElementById("resetPwd2").value;
        if (pwd !== pwd2) {
          e.preventDefault();
          alert("Mật khẩu xác nhận không khớp!");
        }
      });
    </script>
    <script th:src="@{/client/js/app.js}"></script>
  </body>
</html>
