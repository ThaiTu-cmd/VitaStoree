<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quên mật khẩu – VitaStore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/client/css/variables.css}" />
    <link rel="stylesheet" th:href="@{/client/css/main.css}" />
    <link rel="stylesheet" th:href="@{/client/css/components.css}" />
    <link rel="stylesheet" th:href="@{/client/css/pages.css}" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-logo">
          <a th:href="@{/}" class="logo" style="justify-content: center">
            <div class="logo-icon">🌿</div>
            <span class="logo-text">VitaStore</span>
          </a>
        </div>

        <div class="text-center">
          <h3 class="auth-title">Quên mật khẩu</h3>
          <p class="auth-subtitle">Nhập email để nhận mã xác thực OTP</p>
        </div>

        <div th:if="${error}" style="background:#ffebee;color:#c62828;padding:10px 14px;border-radius:8px;font-size:0.875rem;margin-bottom:20px;display:flex;align-items:center;gap:8px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <span th:text="${error}">Email không tồn tại.</span>
        </div>

        <form th:action="@{/auth/forgot-password}" method="post">
          <div class="form-group">
            <label class="form-label">Email</label>
            <div class="input-icon-wrap">
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                <polyline points="22,6 12,13 2,6" />
              </svg>
              <input class="form-control" type="email" name="email" placeholder="email@example.com" autocomplete="email" required />
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg">Gửi mã OTP</button>
        </form>

        <p class="auth-footer">
          <a th:href="@{/auth/login}">Quay lại đăng nhập</a>
        </p>
      </div>
    </div>
    <script th:src="@{/client/js/app.js}"></script>
  </body>
</html>
