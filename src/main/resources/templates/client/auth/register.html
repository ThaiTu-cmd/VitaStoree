<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký – VitaStore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/client/css/variables.css}" />
    <link rel="stylesheet" th:href="@{/client/css/main.css}" />
    <link rel="stylesheet" th:href="@{/client/css/components.css}" />
    <link rel="stylesheet" th:href="@{/client/css/pages.css}" />
    <style>
      body {
        position: relative;
        overflow: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(76, 175, 80, 0.12) 0%, transparent 70%);
        top: -200px;
        right: -150px;
        border-radius: 50%;
        pointer-events: none;
      }
      body::after {
        content: "";
        position: fixed;
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(33, 150, 243, 0.1) 0%, transparent 70%);
        bottom: -120px;
        left: -100px;
        border-radius: 50%;
        pointer-events: none;
      }
      .auth-card {
        position: relative;
        z-index: 1;
        animation: authFadeIn 0.5s ease both;
      }
      @keyframes authFadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .logo-icon {
        background: linear-gradient(135deg, var(--color-green), #66bb6a);
        border: none;
        box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
      }
      .logo-icon svg { color: #fff; }
      .logo-text {
        color: var(--color-grey-900);
        font-weight: 700;
      }
      .auth-title { color: var(--color-grey-900); }
      .auth-subtitle { color: var(--color-grey-500); }
      .form-label { color: var(--color-grey-700); font-weight: 600; }
      .form-control {
        background: var(--color-grey-100);
        border-color: var(--color-grey-300);
        color: var(--color-grey-900);
      }
      .form-control:focus {
        border-color: var(--color-green);
        box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.15);
        background: var(--color-white);
      }

      .input-icon-wrap .input-icon { color: var(--color-grey-400); }
      .input-icon-wrap .input-eye,
      .input-icon-wrap .input-eye svg { color: var(--color-grey-400); }
      .input-icon-wrap .input-eye:hover { color: var(--color-green); }
      .divider-or { color: var(--color-grey-400); }
      .divider-or::before,
      .divider-or::after { background: var(--color-border); }
      .auth-footer { color: var(--color-grey-500); }
      .auth-footer a { color: var(--color-green); }
      .btn-ghost {
        color: var(--color-grey-700);
        border-color: var(--color-grey-300);
      }
      .btn-ghost:hover { background: var(--color-grey-100); }
      .auth-alert {
        background: #fef2f2;
        color: var(--color-danger);
        padding: 10px 14px;
        border-radius: var(--radius-md);
        font-size: var(--font-size-sm);
        margin-bottom: var(--space-5);
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid #fecaca;
      }
      .form-grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-4);
      }
      @media (max-width: 480px) {
        .form-grid-2 { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="auth-page" style="padding: 40px 16px">
      <div class="auth-card" style="max-width: 500px">
        <!-- Logo -->
        <div class="auth-logo">
          <a th:href="@{/}" class="logo" style="justify-content: center">
            <div class="logo-icon">🌿</div>
            <span class="logo-text">VitaStore</span>
          </a>
        </div>

        <div class="text-center">
          <h3 class="auth-title">Tạo tài khoản mới</h3>
          <p class="auth-subtitle">Đăng ký để trải nghiệm mua sắm tốt hơn</p>
        </div>

        <!-- Error -->
        <div
          th:if="${param.error}"
          class="auth-alert"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <span th:text="${error}">Đã xảy ra lỗi.</span>
        </div>

        <!-- Register Form -->
        <form
          th:action="@{/auth/register}"
          method="post"
          id="registerForm"
          novalidate
        >
          <div class="form-grid-2">
            <div class="form-group">
              <label class="form-label">Họ</label>
              <input
                class="form-control"
                type="text"
                name="firstName"
                th:value="${param.firstName}"
                required
              />
            </div>
            <div class="form-group">
              <label class="form-label">Tên</label>
              <input
                class="form-control"
                type="text"
                name="lastName"
                th:value="${param.lastName}"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Email</label>
            <div class="input-icon-wrap">
              <svg
                class="input-icon"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                />
                <polyline points="22,6 12,13 2,6" />
              </svg>
              <input
                class="form-control"
                type="email"
                name="email"
                th:value="${param.email}"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Số điện thoại</label>
            <div class="input-icon-wrap">
              <svg
                class="input-icon"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.8 19.79 19.79 0 0 1 1.61 5.2 2 2 0 0 1 3.59 3h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 10.5a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.72 18z"
                />
              </svg>
              <input
                class="form-control"
                type="tel"
                name="phone"
                th:value="${param.phone}"
              />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Mật khẩu</label>
            <div class="input-icon-wrap">
              <svg
                class="input-icon"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <input
                class="form-control"
                type="password"
                name="password"
                id="regPwd"
                autocomplete="new-password"
                required
                minlength="8"
              />
              <span class="input-eye" onclick="togglePwd('regPwd', this)">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </span>
            </div>
            <!-- Password strength indicator -->
            <div
              id="pwdStrength"
              style="
                margin-top: 6px;
                height: 4px;
                background: var(--color-grey-200);
                border-radius: 4px;
                overflow: hidden;
              "
            >
              <div
                id="pwdStrengthBar"
                style="
                  height: 100%;
                  width: 0%;
                  border-radius: 4px;
                  transition: all 0.3s;
                "
              ></div>
            </div>
            <p
              id="pwdStrengthText"
              style="
                font-size: 0.75rem;
                color: var(--color-grey-500);
                margin-top: 4px;
              "
            ></p>
          </div>

          <div class="form-group">
            <label class="form-label">Xác nhận mật khẩu</label>
            <div class="input-icon-wrap">
              <svg
                class="input-icon"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <input
                class="form-control"
                type="password"
                name="confirmPassword"
                id="regPwd2"
                autocomplete="new-password"
                required
              />
              <span class="input-eye" onclick="togglePwd('regPwd2', this)">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </span>
            </div>
            <p id="pwdMatchMsg" style="font-size: 0.75rem; margin-top: 4px"></p>
          </div>

          <div
            style="
              display: flex;
              align-items: flex-start;
              gap: 8px;
              margin-bottom: 20px;
            "
          >
            <input
              type="checkbox"
              id="agreeTerms"
              name="agreeTerms"
              required
              style="
                accent-color: var(--color-green);
                width: 15px;
                height: 15px;
                margin-top: 2px;
                flex-shrink: 0;
              "
            />
            <label
              for="agreeTerms"
              style="
                font-size: 0.875rem;
                color: var(--color-grey-700);
                cursor: pointer;
                line-height: 1.5;
              "
            >
              Tôi đồng ý với
              <a href="#" style="color: var(--color-green)"
                >Điều khoản dịch vụ</a
              >
              và
              <a href="#" style="color: var(--color-green)"
                >Chính sách bảo mật</a
              >
              của VitaStore
            </label>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg">
            Tạo tài khoản
          </button>
        </form>

        <p class="auth-footer">
          Đã có tài khoản?
          <a th:href="@{/auth/login}">Đăng nhập</a>
        </p>
      </div>
    </div>

    <script>
      function togglePwd(id) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
      }

      // Password strength
      const pwdInput = document.getElementById("regPwd");
      const pwd2Input = document.getElementById("regPwd2");
      if (pwdInput) {
        pwdInput.addEventListener("input", () => {
          const val = pwdInput.value;
          const bar = document.getElementById("pwdStrengthBar");
          const text = document.getElementById("pwdStrengthText");
          if (!bar || !text) return;
          let strength = 0;
          if (val.length >= 8) strength++;
          if (/[A-Z]/.test(val)) strength++;
          if (/[0-9]/.test(val)) strength++;
          if (/[^A-Za-z0-9]/.test(val)) strength++;
          const levels = [
            { pct: "25%", color: "#c62828", label: "Yếu" },
            { pct: "50%", color: "#ef6c00", label: "Trung bình" },
            { pct: "75%", color: "#f9a825", label: "Khá" },
            { pct: "100%", color: "#2e7d32", label: "Mạnh" },
          ];
          if (val.length === 0) {
            bar.style.width = "0";
            text.textContent = "";
            return;
          }
          const lvl = levels[Math.min(strength, 4) - 1] || levels[0];
          bar.style.width = lvl.pct;
          bar.style.background = lvl.color;
          text.textContent = `Độ mạnh: ${lvl.label}`;
          text.style.color = lvl.color;
        });
      }

      // Password match
      if (pwd2Input) {
        pwd2Input.addEventListener("input", () => {
          const msg = document.getElementById("pwdMatchMsg");
          if (!msg) return;
          if (pwd2Input.value === "") {
            msg.textContent = "";
            return;
          }
          if (pwd2Input.value === pwdInput.value) {
            msg.textContent = "✓ Mật khẩu khớp";
            msg.style.color = "var(--color-green)";
          } else {
            msg.textContent = "✕ Mật khẩu không khớp";
            msg.style.color = "#c62828";
          }
        });
      }

      // Client-side validation before submit
      document
        .getElementById("registerForm")
        ?.addEventListener("submit", (e) => {
          const pwd = document.getElementById("regPwd").value;
          const pwd2 = document.getElementById("regPwd2").value;
          if (pwd !== pwd2) {
            e.preventDefault();
            alert("Mật khẩu xác nhận không khớp!");
          }
        });
    </script>
    <script th:src="@{/client/js/app.js}"></script>
  </body>
</html>
