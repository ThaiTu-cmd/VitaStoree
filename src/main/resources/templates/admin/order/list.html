<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Orders — VitaStore Admin</title>
    <link rel="stylesheet" th:href="@{/admin/css/style.css?v=1}" />
  </head>
  <body>
    <div class="admin-layout">
      <!-- SIDEBAR -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
          <div class="logo-icon">🌿</div>
          <div>
            <div class="logo-text">VitaStore</div>
            <div class="logo-sub">Admin Panel</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-section-label">Tổng quan</div>
          <a class="nav-item" data-page="dashboard" th:href="@{/admin}"
            ><span class="nav-icon">🏠</span> Dashboard</a
          >
          <div class="nav-section-label">Quản lý đơn hàng</div>
          <a
            class="nav-item active"
            data-page="orders"
            th:href="@{/admin/order/list}"
            ><span class="nav-icon">📦</span> Orders</a
          >
          <div class="nav-section-label">Sản phẩm</div>
          <a class="nav-item" th:href="@{/admin/product/list}"
            ><span class="nav-icon">🛍</span> Products</a
          >
          <a class="nav-item" th:href="@{/admin/product/category}"
            ><span class="nav-icon">🗂</span> Categories</a
          >
          <div class="nav-section-label">Người dùng</div>
          <a class="nav-item" th:href="@{/admin/user/list}"
            ><span class="nav-icon">👥</span> Users</a
          >

        </nav>
        <div class="sidebar-bottom">
          <div class="admin-profile">
            <div class="admin-avatar">A</div>
            <div>
              <div class="admin-name">Admin Master</div>
              <div class="admin-role">Super Admin</div>
            </div>
          </div>
        </div>
      </aside>

      <div class="main-wrap">
        <header class="topbar">
          <div class="topbar-info">
            <div class="topbar-title">Orders</div>
            <div class="topbar-breadcrumb">Quản lý đơn hàng</div>
          </div>
          <div class="topbar-right">
            <button
              class="icon-btn"
              title="Cài đặt"
              onclick="toggleLogoutDropdown()"
            >
              ⚙️
            </button>
            <div
              class="dropdown-menu"
              id="logoutDropdown"
              style="display: none"
            >
              <button
                class="dropdown-item dropdown-item-logout"
                onclick="logout()"
              >
                ❌ Đăng xuất
              </button>
            </div>
          </div>
        </header>

        <div class="page-wrap">
          <div class="page-header">
            <div>
              <div class="page-title">Danh sách Orders</div>
              <div class="page-subtitle">Tất cả đơn hàng trong hệ thống</div>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <div class="toolbar">
                <div class="search-box">
                  <span class="search-icon">🔍</span>
                  <input
                    type="text"
                    id="searchInput"
                    placeholder="Tìm mã đơn, tên khách..."
                    oninput="filterOrders()"
                  />
                </div>
                <select
                  class="select-filter"
                  id="statusFilter"
                  onchange="filterOrders()"
                >
                  <option value="">Tất cả trạng thái</option>
                  <option value="pending">Chờ xử lý</option>
                  <option value="shipping">Đang giao</option>
                  <option value="completed">Hoàn thành</option>
                  <option value="cancelled">Đã hủy</option>
                </select>
              </div>
              <span class="badge badge-info" id="orderCount">— đơn</span>
            </div>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Order Code</th>
                    <th>Username</th>
                    <th>User ID</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="ordersBody">
                  <tr>
                    <td
                      colspan="7"
                      style="
                        text-align: center;
                        padding: 40px;
                        color: var(--text-muted);
                      "
                    >
                      Đang tải...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div class="pagination" id="pagination"></div>
          </div>
        </div>
      </div>
    </div>

    <script th:src="@{/admin/js/admin.js}"></script>
    <script>
      let allOrders = [];
      let filteredOrders = [];
      let currentPage = 1;
      const PAGE_SIZE = 10;

      async function loadOrders() {
        allOrders = await API.getOrders();
        currentPage = 1;
        filterOrders();
      }

      function renderPage() {
        const start = (currentPage - 1) * PAGE_SIZE;
        const pageItems = filteredOrders.slice(start, start + PAGE_SIZE);
        const totalPages = Math.ceil(filteredOrders.length / PAGE_SIZE) || 1;

        document.getElementById("orderCount").textContent =
          `${filteredOrders.length} đơn`;
        document.getElementById("ordersBody").innerHTML = filteredOrders.length
          ? pageItems
              .map(
                (o) => `
        <tr>
          <td class="td-mono">#${o.id}</td>
          <td class="td-mono"><strong>${o.orderCode}</strong></td>
          <td>${o.username}</td>
          <td class="td-mono">${o.userId}</td>
          <td style="font-weight:700;color:var(--primary)">${Utils.formatCurrency(o.total)}</td>
          <td>${Utils.statusBadge(o.status)}</td>
          <td>
            <div class="action-group">
              <a href="${APP_CONTEXT_PATH}/admin/order/detail?id=${o.id}" class="btn btn-sm btn-outline">👁 View</a>
            </div>
          </td>
        </tr>`,
              )
              .join("")
          : `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)">Không tìm thấy đơn hàng nào</td></tr>`;
        renderPagination(totalPages);
      }

      function renderPagination(totalPages) {
        let html = `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>&#8249;</button>`;
        for (let i = 1; i <= totalPages; i++) {
          html += `<button class="page-btn${i === currentPage ? ' active' : ''}" onclick="goToPage(${i})">${i}</button>`;
        }
        html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>&#8250;</button>`;
        document.getElementById("pagination").innerHTML = html;
      }

      function goToPage(page) {
        const totalPages = Math.ceil(filteredOrders.length / PAGE_SIZE) || 1;
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderPage();
      }

      function filterOrders() {
        const q = document.getElementById("searchInput").value.toLowerCase();
        const st = document.getElementById("statusFilter").value;
        filteredOrders = allOrders.filter(
          (o) =>
            (!q ||
              o.orderCode.toLowerCase().includes(q) ||
              o.username.toLowerCase().includes(q)) &&
            (!st || o.status === st),
        );
        currentPage = 1;
        renderPage();
      }

      document.addEventListener("DOMContentLoaded", loadOrders);
    </script>
  </body>
</html>
