services:
  mysql:
    image: mysql:8
    container_name: vitastore-mysql
    restart: unless-stopped
    env_file: .env
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./VitaStore_DB.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
      test: ["CMD-SHELL", "mysql -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" -e 'SELECT 1' \"$${MYSQL_DATABASE}\" >/dev/null 2>&1"]
    networks:
      - vitastore-net

  app:
    build: .
    container_name: vitastore-app
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/VitaStore/auth/login"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 40s
    networks:
      - vitastore-net

volumes:
  mysql-data:

networks:
  vitastore-net:
    driver: bridge
