name: CD

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repository name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Encode env file
        env:
          ENV_PROD_FILE: ${{ secrets.ENV_PROD_FILE }}
        run: |
          echo "$ENV_PROD_FILE" | base64 -w0 > /tmp/env_prod.b64
          echo "ENV_B64=$(cat /tmp/env_prod.b64)" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ github.sha }}

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,VitaStore_DB.sql,nginx"
          target: /opt/vitastore

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: ENV_B64,GITHUB_TOKEN,GITHUB_ACTOR,FRONTEND_API_BASE_URL,GITHUB_REPOSITORY
          script: |
            set -e
            cd /opt/vitastore
            echo "$ENV_B64" | base64 -d > .env
            sed -i "s@\${FRONTEND_API_BASE_URL}@$FRONTEND_API_BASE_URL@g" .env
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            GITHUB_REPOSITORY=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
            docker volume create vitastore_mysql-data >/dev/null
            docker rm -f vitastore-app vitastore-mysql mysql 2>/dev/null || true
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans

            # Wait for MySQL and create database user for persisted volumes
            for ((i=1; i<=30; i++)); do
              if docker exec vitastore-mysql mysqladmin ping -h localhost --silent 2>/dev/null; then
                echo "MySQL ready"
                source .env
                docker exec vitastore-mysql mysql -u root -p"$MYSQL_ROOT_PASSWORD" -e \
                  "CREATE USER IF NOT EXISTS '${SPRING_DATASOURCE_USERNAME}'@'%' IDENTIFIED BY '${SPRING_DATASOURCE_PASSWORD}'; \
                   GRANT ALL PRIVILEGES ON ${MYSQL_DATABASE}.* TO '${SPRING_DATASOURCE_USERNAME}'@'%'; \
                   FLUSH PRIVILEGES;"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "MySQL failed to start"
                docker logs vitastore-mysql --tail 30
                exit 1
              fi
              sleep 2
            done

            for ((i=1; i<=30; i++)); do
              if curl -sf http://127.0.0.1:8080/VitaStore/auth/login > /dev/null 2>&1; then
                echo "healthy"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "health check failed"
                docker logs vitastore-app --tail 50
                exit 1
              fi
              sleep 2
            done
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled /var/www/html
            if sudo test -f /etc/letsencrypt/live/thaitucmd.store/fullchain.pem && sudo test -f /etc/letsencrypt/live/thaitucmd.store/privkey.pem; then
              sudo install -m 0644 /opt/vitastore/nginx/vitastore-ssl.conf /etc/nginx/sites-available/vitastore.conf
            else
              sudo install -m 0644 /opt/vitastore/nginx/vitastore.conf /etc/nginx/sites-available/vitastore.conf
            fi
            sudo ln -sfn /etc/nginx/sites-available/vitastore.conf /etc/nginx/sites-enabled/vitastore.conf
            sudo nginx -t
            sudo systemctl reload nginx
            docker image prune -f
        env:
          ENV_B64: ${{ env.ENV_B64 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          FRONTEND_API_BASE_URL: ${{ vars.FRONTEND_API_BASE_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
